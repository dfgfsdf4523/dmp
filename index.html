<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Воины-интернационалисты Столинщины</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="info-page">
        <div class="content-wrapper">
            <h1>Героям-интернационалистам посвящается</h1>
            <p>Интерактивный плакат о мужестве, чести и памяти уроженцев Столинского района, исполнявших интернациональный долг в Афганистане.</p>
            <button id="go-to-space">Перейти к плакату</button>
        </div>
    </section>

    <div id="space-container" class="hidden">
        <div id="memorial-center">
            <img src="img/memorial.png" alt="Мемориал">
        </div>

        <div class="nav-item" id="item-prizyv" data-title="Жизненный путь" 
             data-info="<img src='img/vladimir_young.jpg' class='modal-img'>Карповіч Уладзімір Іванавіч нарадзіўся 4 ліпеня 1966 года ў вёсцы Верхні Церабяжоў.<ul><li><strong>Адукацыя:</strong> Скончыў Крычаўскі тэхнікум па спецыяльнасці механіка.</li><li><strong>Служба:</strong> 14 кастрычніка 1984 года быў прызваны ў рады Савецкай Арміі.</li></ul>">
            <img src="img/prizyv.png" alt="Призыв">
            <span class="label">БИОГРАФИЯ</span>
        </div>

        <div class="nav-item" id="item-salang" data-title="Ветераны Столинщины" 
             data-info="<img src='img/gramota_stolin.jpg' class='modal-img'>На Столинщине проживает 250 воинов-интернационалистов.<ul><li><strong>Организация:</strong> Владимир Карпович возглавляет районный «Союз ветеранов войны в Афганистане» с 1991 года.</li><li><strong>Актив:</strong> Ветераны активно участвуют в жизни района и воспитании молодежи.</li></ul>">
            <img src="img/salang.png" alt="Слава">
            <span class="label">ВЕТЕРАНЫ</span>
        </div>

        <div class="nav-item" id="item-nagrada" data-title="Боевые Награды" 
             data-info="<img src='img/gramota_ussr.jpg' class='modal-img'>За мужество и воинскую доблесть Владимир Иванович удостоен высоких наград:<ul><li><strong>Медаль «За отвагу»:</strong> Награжден Указом от 21 марта 1986 года.</li><li><strong>Грамота Президиума ВС СССР:</strong> Вручена 28 декабря 1988 года.</li><li><strong>Медаль от афганского народа:</strong> Получена в мае 1988 года.</li></ul>">
            <img src="img/nagrada.png" alt="Мужество">
            <span class="label">НАГРАДЫ</span>
        </div>

        <div class="nav-item" id="item-pamyat" data-title="Исповедь солдата" 
             data-info="<img src='img/vladimir_modern.jpg' class='modal-img'>«Я ведь и вернулся с того ада благодаря ей, её неустанным молитвам...»<ul><li><strong>О маме:</strong> Пронзительные строки о том, как материнская любовь помогала выжить и как трудно было скрывать ранения от родных.</li><li><strong>Память:</strong> Память о войне — это прежде всего память о людях.</li></ul>">
            <img src="img/pamyat.png" alt="Память">
            <span class="label">ПАМЯТЬ</span>
        </div>

        <div class="nav-item" id="item-svyaz" data-title="Письма родителям" 
             data-info="<img src='img/letter_home.jpg' class='modal-img'>Благодарственные письма командования — самая дорогая весточка для родителей.<ul><li><strong>Цитата:</strong> «Командование части благодарит Вас за честную и добросовестную службу Вашего сына».</li><li><strong>Адресаты:</strong> Письма летели в Верхний Теребежов Ивану и Марии Петровне.</li></ul>">
            <img src="img/pismo.png" alt="Связь">
            <span class="label">ПИСЬМА</span>
        </div>

        <div class="nav-item" id="item-quest" data-is-quiz="true">
            <img src="img/quest.png" alt="Квиз">
            <span class="label">КВИЗ</span>
        </div>
    </div>

    <div id="info-modal" class="hidden-modal">
        <h2 id="modal-title"></h2>
        <div id="modal-desc"></div>
        <button id="close-btn">Вернуться к обзору</button>
    </div>

    <div id="quiz-modal" class="quiz-overlay hidden">
        <div class="quiz-content">
            <h2 id="quiz-question">Вопрос</h2>
            <div id="quiz-options" class="quiz-grid"></div>
            <button id="quiz-next-btn" class="hidden">Далее</button>
            <button id="quiz-close-btn">Выйти</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
